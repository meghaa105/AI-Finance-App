      .custom-scrollbar::-webkit-scrollbar {

      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.1);

      @keyframes marquee {
        0% { transform: translateX(100%); }
        100% { transform: translateX(-100%); }
      }
      .animate-marquee {
        animation: marquee 60s linear infinite;
      }
      .pixel-border {
        box-shadow: 
          0 4px 0 -2px #000, 
          0 -4px 0 -2px #000, 
          4px 0 0 -2px #000,

          0 0 0 2px #fff;
      }
